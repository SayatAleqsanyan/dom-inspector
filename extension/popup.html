<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM Inspector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #313244;
    }
    .logo {
      width: 22px; height: 22px;
      background: #cba6f7;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #1e1e2e; font-weight: 700;
    }
    .title { font-size: 14px; font-weight: 600; color: #cdd6f4; }
    .version { font-size: 10px; color: #45475a; margin-left: auto; }

    .section { padding: 10px 14px; border-bottom: 1px solid #313244; }
    .section-title {
      font-size: 10px; text-transform: uppercase; letter-spacing: .07em;
      color: #6c7086; margin-bottom: 8px;
    }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .toggle-row:last-child { margin-bottom: 0; }
    .toggle-label { font-size: 12px; color: #cdd6f4; }

    /* Toggle switch */
    .toggle { position: relative; width: 36px; height: 20px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #313244;
      border-radius: 20px; cursor: pointer; transition: background .2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 14px; height: 14px; left: 3px; bottom: 3px;
      background: #6c7086; border-radius: 50%; transition: all .2s;
    }
    input:checked + .slider { background: #cba6f7; }
    input:checked + .slider::before { transform: translateX(16px); background: #1e1e2e; }

    .btn {
      width: 100%; padding: 8px 12px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 500; transition: opacity .15s;
      text-align: center; margin-bottom: 6px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #cba6f7; color: #1e1e2e; }
    .btn-secondary { background: #313244; color: #cdd6f4; }
    .btn-danger { background: #f38ba8; color: #1e1e2e; }

    .status {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      font-size: 11px; color: #6c7086;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #45475a; flex-shrink: 0;
    }
    .status-dot.active { background: #a6e3a1; box-shadow: 0 0 4px #a6e3a1; }

    .shortcut {
      font-size: 10px; color: #45475a;
      background: #252535; padding: 2px 6px; border-radius: 3px;
      font-family: monospace;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">⬡</div>
  <div class="title">DOM Inspector</div>
  <div class="version">v3.0</div>
</div>

<div class="section">
  <div class="section-title">Inspector</div>

  <div class="toggle-row">
    <span class="toggle-label">Enable inspector</span>
    <label class="toggle">
      <input type="checkbox" id="toggle-enabled">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Freeze on click</span>
    <label class="toggle">
      <input type="checkbox" id="toggle-freeze">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Dark theme</span>
    <label class="toggle">
      <input type="checkbox" id="toggle-theme" checked>
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="section">
  <div class="section-title">Trigger key</div>
  <div class="toggle-row">
    <span class="toggle-label">Hover modifier</span>
    <select id="trigger-key" style="background:#252535;color:#cdd6f4;border:1px solid #45475a;border-radius:4px;padding:3px 6px;font-size:11px;cursor:pointer;">
      <option value="Alt">Alt</option>
      <option value="Control">Ctrl</option>
      <option value="Meta">Cmd</option>
      <option value="Shift">Shift</option>
    </select>
  </div>
</div>

<div class="section">
  <button class="btn btn-primary" id="btn-enable">Enable on this page</button>
  <button class="btn btn-secondary" id="btn-disable">Disable</button>
</div>

<div class="status">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Not active</span>
  <span class="shortcut" style="margin-left:auto">Alt+hover</span>
</div>

<script src="popup.js"></script>
</body>
</html>
